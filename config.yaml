# Kairon Configuration
# Edit rules here or ask the agent to update via natural language.

calendars:
  - id: "primary"
    name: "Personal"
  # TUM subscription calendar — replace with actual calendar ID after first sync
  - id: "6a4h38ovkaue3p1880a5ijoglmsv02vg@import.calendar.google.com"
    name: "TUM University"

day:
  start: "07:30"
  end: "21:00"
  granularity: 15 # minutes

# Events matching these patterns are shown faded and treated as free time
ignored_events:
  - pattern: "Fachschaftsvollversammlung"

# Commute buffer for on-campus events (minutes each way)
commute_buffer: 45

# Minimum gap between meals in minutes (soft constraint)
min_meal_gap: 180

activities:
  - name: "Work"
    type: work
    duration: 120 # preferred block size in minutes
    min_duration: 90 # minimum block size
    hours_per_week: 20
    min_hours_per_week: 19
    max_hours_per_week: 21
    priority: critical
    earliest: "07:30"
    latest: "21:00"
    preferred_time: "morning"
    constraints:
      - "consolidate_days" # fewer days with longer blocks preferred
      - "avoid_window:fri:1800:2100:8"
      - "avoid_window:sat:0730:1200:4"
      - "avoid_window:sat:1800:2100:6"
      - "avoid_window:sun:0730:1200:5"
    allowed_days: [mon, tue, wed, thu, fri, sat, sun]
    preferred_days: [mon, tue, wed, thu, fri]
    notes: "Sunday acceptable for overflow, Saturday less preferred"

  - name: "Gym"
    type: fitness
    duration: 135 # 2h15 including commute
    frequency: 4 # times per week
    priority: important
    earliest: "07:30"
    latest: "16:00" # must end by 16:00
    constraints:
      - "no_three_consecutive_gym_days"
      - "pattern: gym-gym-run-gym-gym"
      - "prefer_late"
      - "day_earliest:wed:13:45"
    allowed_days: [mon, tue, wed, thu, fri, sat, sun]
    preferred_days: [mon, tue, wed, thu, fri, sat]
    notes: "Bias gym as late as possible within its window; Wednesday should fall after Tutorium. Saturday is fine if it helps avoid awkward early sessions or 3-day streaks."

  - name: "Easy Run"
    type: fitness
    duration: 75 # 1h15
    frequency: 1 # once per week
    priority: important
    earliest: "07:30"
    latest: "18:45"
    preferred_time: "18:15"
    preferred_day: thu
    location: home
    constraints:
      - "prefer_late"
      - "avoid_weekend:60"
    notes: "Home only, no commute needed. Counts as break between gym days. Prefer it right before dinner; never after dinner. Biased off weekends so cardio stays spread — weekends may get eaten by a day-long hike."

  - name: "Self-Study/Admin/Projects"
    type: uni
    duration: 60 # preferred block size
    min_duration: 45
    hours_per_week: 18
    min_hours_per_week: 14
    max_hours_per_week: 18
    priority: mid
    earliest: "07:30"
    latest: "21:00"
    constraints:
      - "prefer_fuller_quota"
      - "avoid_window:fri:1800:2100:4"
      - "avoid_window:sat:0730:1200:4"
      - "avoid_window:sat:1800:2100:5"
      - "avoid_window:sun:0730:1200:5"
    notes: "Unified flexible productive bucket for self-study, admin, and projects. Its weekly range is tuned so total productive time usually lands around 50-55 hours/week."

  - name: "Breakfast"
    type: meal
    duration: 30
    frequency: 7
    priority: important
    preferred_time: "10:00"
    latest: "10:30"
    notes: "Ideal at 10:00, no later than 10:00 start (10:30 end)"

  - name: "Lunch"
    type: meal
    duration: 30
    frequency: 7
    priority: important
    preferred_time: "13:00"

  - name: "Dinner"
    type: meal
    duration: 30
    frequency: 7
    priority: important
    preferred_time: "19:00"
    latest: "20:00"

  - name: "Break"
    type: break
    duration: 15
    priority: suggestion
    notes: "Auto-fill gaps under 30 minutes between events"

# Fixed weekly events not from calendar (if any)
fixed_events:
  - name: "Work Meeting"
    day: thu
    start: "16:00"
    end: "16:30"
    type: work
